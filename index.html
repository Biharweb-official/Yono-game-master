<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALLYONOSLOTS.COM</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 0; }
        header { padding: 20px; text-align: center; color: #ff00ff; font-weight: bold; font-size: 24px; border-bottom: 3px solid #00cccc; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: #2d3446; padding: 10px; border-radius: 8px; text-align: center; text-decoration: none; color: white; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; }
        .card h4 { margin: 8px 0 2px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stars { color: #ffcc00; font-size: 10px; margin-top: 2px; }
    </style>
</head>
<body>

<header>ALLYONOSLOTS.COM</header>

<div class="grid">
    <script>
        const games = [
            "MBMbet", "Yono Games", "Spin Winner", "567 Slots", "YN777", "Bingo101", 
            "Yono Arcade", "Jaiho 777", "Yono VIP", "789 Jackpots", "Jaiho Spin", 
            "Jaiho Arcade", "ABC Rummy", "IND Slots", "Slots Spin", "Slots Winner", 
            "Neta.VIP", "Spin Gold", "IND Rummy", "SPIN 101", "Gogorummy", 
            "Jaiho Slots", "SPIN777", "My11Circle", "101 Z", "Jaiho Rummy", 
            "Rummy 91", "YONO777", "Yono Slots", "Yono Poker"
        ];

        games.forEach(game => {
            document.write(`
                <a href="https://t.me/official_yonocodes" class="card">
                    <img src="https://cdn-icons-png.flaticon.com/128/3180/3180373.png" alt="Game">
                    <h4>${game}</h4>
                    <div class="stars">★★★★★</div>
                </a>
            `);
        });
    </script>
</div>

</body>
</html>
