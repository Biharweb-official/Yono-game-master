<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Yono Slots Games</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        header { background-color: #1a1a1a; padding: 20px; text-align: center; color: #ff00ff; font-weight: bold; font-size: 24px; border-bottom: 5px solid #00cccc; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 10px; }
        .card h4 { margin: 10px 0 5px; font-size: 13px; color: #333; }
        .tag { font-size: 10px; color: #888; margin-bottom: 5px; }
        .stars { color: #ffcc00; font-size: 12px; }
        a { text-decoration: none; display: block; }
    </style>
</head>
<body>

<header>ALLYONOSLOTS.COM</header>

<div class="grid">
    <!-- Game 1 -->
    <a href="https://t.me/official_yonocodes" class="card">
        <img src="https://via.placeholder.com/150" alt="Game">
        <h4>Boss Rummy</h4>
        <div class="tag">LATEST</div>
        <div class="stars">★★★★★</div>
    </a>

    <!-- Game 2 -->
    <a href="https://t.me/official_yonocodes" class="card">
        <img src="https://via.placeholder.com/150" alt="Game">
        <h4>BINGO 101</h4>
        <div class="tag">All Yono App</div>
        <div class="stars">★★★★★</div>
    </a>

    <!-- Game 3 -->
    <a href="https://t.me/official_yonocodes" class="card">
        <img src="https://via.placeholder.com/150" alt="Game">
        <h4>SPIN 777</h4>
        <div class="tag">All Yono App</div>
        <div class="stars">★★★★★</div>
    </a>
    
    <!-- Isi tarah aap niche aur cards add karte jayen -->
</div>

</body>
</html>
